<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selecionar Música</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons/7.1.0/dist/ionicons/ionicons.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #333;
      min-height: 100vh;
    }

    .header {
      padding: 16px 1rem 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 0;
    }

    .header-left,
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 12px;
    }

    .search-bar {
      width: 100%;
      padding: 0 22px;
      border: 0;
      height: 55px;
      border-radius: 32px;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .musica-item {
      background: white;
      padding: 16px 22px;
      margin-bottom: 6px;
      border-radius: 22px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      cursor: pointer;
      border: 1px solid #eee;
    }



    .musica-content {
      flex: 1;
      padding-right: 12px;
      border-right: 1px solid #f0f0f0;
      /* Linha separadora */
    }

    .musica-titulo {
      font-size: 1rem;
      font-weight: 500;
      color: #2c3e50;
    }

    .musica-info {
      font-size: 0.95rem;
      margin-top: 6px;
    }

    .icon-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #2c3e50;
      padding: 8px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 46px;
      width: 46px;
    }

    .icon-btn:hover {
      background: #f1f3f5;
      color: #3498db;
    }

    .tag {
      display: inline-block;
      color: #1976d2;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 12px;
      margin-right: 6px;
    }

    .btn-editar {
      padding: 12px 12px;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn-editar:hover {
      background: linear-gradient(135deg, #e67e22, #d35400);
      transform: scale(1.05);
    }
  </style>

  <script type="module">
    import { getMusicas, carregarTodosDados } from './app-state.js';

    let todasMusicas = [];
    let slotIndex = 0;

    async function carregarMusicas() {
      try {
        await carregarTodosDados();
        todasMusicas = getMusicas();
        renderizarMusicas(todasMusicas);
      } catch (e) {
        console.error("Erro ao carregar músicas:", e);
        alert("Erro ao carregar lista de músicas.");
      }
    }

    function renderizarMusicas(musicas) {
      const container = document.getElementById('listaMusicas');
      container.innerHTML = '';

      if (musicas.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:60px; color:#777;">Nenhuma música encontrada.</p>';
        return;
      }

      musicas.forEach(musica => {
        const div = document.createElement('div');
        div.className = 'musica-item';

        div.innerHTML = `
          <div class="musica-content">
            <div class="musica-titulo">${musica.titulo}</div>
            <div class="musica-info">
              <div>${musica.tom ? `Tom: ${musica.tom}` : ''}</div>
              <div>${musica.versao ? `Versão: ${musica.versao}` : ''}</div>
            </div>
            ${musica.tags ? `<div>${musica.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>` : ''}
          </div>

          <button onclick="editarMusica('${musica.id}'); event.stopImmediatePropagation();" 
                  class="btn-editar" title="Editar música">
            Editar
          </button>
        `;

        div.addEventListener('click', (e) => {
          if (!e.target.closest('.btn-editar')) {
            selecionarMusica(musica);
          }
        });

        container.appendChild(div);
      });
    }

    function selecionarMusica(musica) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'musicaSelecionada',
          slot: slotIndex,
          musica: musica
        }, '*');
      }
      window.close();
    }

    window.editarMusica = function (id) {
      window.open(`cadastro-musicas.html?id=${id}`, '_blank');
    };

    // Filtro de busca
    document.getElementById('busca').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase().trim();

      if (!termo) {
        renderizarMusicas(todasMusicas);
        return;
      }

      const filtradas = todasMusicas.filter(m =>
        m.titulo.toLowerCase().includes(termo) ||
        (m.tags && m.tags.toLowerCase().includes(termo)) ||
        (m.versao && m.versao.toLowerCase().includes(termo))
      );

      renderizarMusicas(filtradas);
    });

    window.onload = async () => {
      const params = new URLSearchParams(window.location.search);
      slotIndex = parseInt(params.get('slot')) || 0;
      await carregarMusicas();
    };


  </script>
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button onclick="window.close()" class="icon-btn" title="Início">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
    </div>



  </header>

  <div class="container">
    <input type="text" id="busca" class="search-bar" placeholder="Buscar por título, versão ou tag...">
    <div id="listaMusicas"></div>


  </div>
</body>

</html>
