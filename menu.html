<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Escala de Louvor</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: .5rem; }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      padding: 1.5rem;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 0.5rem;
      font-size: 2rem;
    }
    p.subtitle {
      color: #2c3e50;
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .menu-grid {
      display: grid;
      gap: 1rem;
      max-width: 520px;
      margin: 0 auto;
    }
    .menu-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      padding: 18px 25px;
      font-size: 1.15rem;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
    }
    .menu-button:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
    }
    .menu-button ion-icon {
      font-size: 1.4rem;
    }

    .footer-info {
      text-align: center;
      margin-top: 3rem;
      color: #7f8c8d;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <div class="card">

      <div class="menu-grid">
        <a href="cadastro-musicas.html" class="menu-button">
          <ion-icon name="musical-notes-outline"></ion-icon>
          Cadastrar Músicas
        </a>
        <a href="cadastro-membros.html" class="menu-button">
          <ion-icon name="people-outline"></ion-icon>
          Cadastrar Membros
        </a>
        <a href="cultos-fixos.html" class="menu-button">
          <ion-icon name="calendar-outline"></ion-icon>
          Cultos Fixos
        </a>
        <a href="escalas-pendentes.html" class="menu-button">
          <ion-icon name="list-outline"></ion-icon>
          Escalas Pendentes
        </a>
        <!-- <a href="index.html" class="menu-button">
          <ion-icon name="home-outline"></ion-icon>
          Ver Escalas Publicadas
        </a> -->
      </div>
    </div>

    <div class="footer-info">
      <p>Projeto: louvorapp • Conectado ao Firebase</p>
      <p>Versão atualizada com nova inteligência de histórico</p>
    </div>
  </div>

  <script src="header.js"></script>
  <script>
    carregarHeader('Menu Principal');
  </script>
</body>
</html>
