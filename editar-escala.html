<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Escala - Louvor</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons/7.1.0/dist/ionicons/ionicons.js"></script>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc, updateDoc, collection, getDocs, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let escalaId = null;
    let escalaAtual = null;
    let todasMusicas = [];
    let todosMembros = [];
    let cultosFixos = [];
    let isNovaEscala = false;
    let musicasSelecionadas = [];

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== "hupcontato@gmail.com") window.location.href = "login.html";
    });

    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      escalaId = params.get('id');
      isNovaEscala = params.get('nova') === 'true';
    }

    function salvarEstadoTemporario() {
      sessionStorage.setItem('escalaEmEdicao', JSON.stringify({
        data: document.getElementById('data').value,
        tipoCulto: document.getElementById('tipoCulto').value,
        tipoCultoPersonalizado: document.getElementById('tipoCultoPersonalizado').value,
        numMusicas: document.getElementById('numMusicas').value,
        numMusicasPersonalizado: document.getElementById('numMusicasPersonalizado').value,
        observacoes: document.getElementById('observacoes').value,
        musicasSelecionadas: musicasSelecionadas
      }));
    }

    function carregarEstadoTemporario() {
      const salvo = sessionStorage.getItem('escalaEmEdicao');
      if (!salvo) return false;
      const estado = JSON.parse(salvo);
      document.getElementById('data').value = estado.data || '';
      document.getElementById('tipoCulto').value = estado.tipoCulto || '';
      document.getElementById('tipoCultoPersonalizado').value = estado.tipoCultoPersonalizado || '';
      document.getElementById('numMusicas').value = estado.numMusicas || 5;
      document.getElementById('numMusicasPersonalizado').value = estado.numMusicasPersonalizado || '';
      document.getElementById('observacoes').value = estado.observacoes || '';
      if (estado.musicasSelecionadas) musicasSelecionadas = estado.musicasSelecionadas;
      return true;
    }

    async function carregarDados() {
      await Promise.all([carregarCultosFixos(), carregarTodasMusicas(), carregarTodosMembros()]);
    }

    async function carregarCultosFixos() {
      const snapshot = await getDocs(collection(db, "cultosFixos"));
      cultosFixos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    async function carregarTodasMusicas() {
      const snapshot = await getDocs(collection(db, "musicas"));
      todasMusicas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      todasMusicas.sort((a, b) => a.titulo.localeCompare(b.titulo, 'pt-BR'));
    }

    async function carregarTodosMembros() {
      const snapshot = await getDocs(collection(db, "membrosEquipe"));
      todosMembros = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    function preencherTipoCulto() {
      const select = document.getElementById('tipoCulto');
      select.innerHTML = '<option value="">Selecione o tipo de culto...</option>';
      cultosFixos.forEach(c => select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);
      select.innerHTML += `<option value="personalizar">Personalizar...</option>`;
    }

    function preencherNumMusicas() {
      const select = document.getElementById('numMusicas');
      select.innerHTML = '<option value="">Selecione a quantidade...</option>';
      const nums = [...new Set(cultosFixos.map(c => c.numMusicas))].sort((a,b)=>a-b);
      nums.forEach(num => select.innerHTML += `<option value="${num}">${num} músicas</option>`);
      select.innerHTML += `<option value="personalizar">Personalizar...</option>`;
    }

    function handleTipoCultoChange() {
      const valor = document.getElementById('tipoCulto').value;
      document.getElementById('personalizarTipoContainer').style.display = valor === "personalizar" ? 'block' : 'none';
      if (valor !== "personalizar") {
        const culto = cultosFixos.find(c => c.nome === valor);
        if (culto) definirQuantidadeMusicas(culto.numMusicas);
      }
    }

    function handleNumMusicasChange() {
      const valor = document.getElementById('numMusicas').value;
      document.getElementById('personalizarNumContainer').style.display = valor === "personalizar" ? 'block' : 'none';
      if (valor !== "personalizar") definirQuantidadeMusicas(parseInt(valor) || 5);
    }

    function definirQuantidadeMusicas(num) {
      musicasSelecionadas = musicasSelecionadas.slice(0, num);
      while (musicasSelecionadas.length < num) musicasSelecionadas.push(null);
      renderizarMusicas();
    }

    function renderizarMusicas() {
      const container = document.getElementById('musicasContainer');
      container.innerHTML = '';
      musicasSelecionadas.forEach((musica, index) => {
        const nome = musica ? `${musica.titulo} ${musica.tom ? `(${musica.tom})` : ''}` : 'Nenhuma música selecionada';
        container.innerHTML += `
          <div class="musica-slot">
            <label><strong>${index + 1}ª Música</strong></label>
            <div style="display:flex; gap:12px; align-items:center;">
              <div style="flex:1; padding:14px; background:#f8f9fa; border:2px solid #e9ecef; border-radius:10px;">
                ${nome}
              </div>
              <button onclick="abrirSelecaoMusica(${index})" class="btn-selecionar">Selecionar</button>
            </div>
          </div>`;
      });
    }

    window.abrirSelecaoMusica = function(slotIndex) {
      salvarEstadoTemporario();
      window.location.href = `selecionar-musica.html?slot=${slotIndex}`;
    };

    function verificarRetornoSelecao() {
      const params = new URLSearchParams(window.location.search);
      const musicaId = params.get('musicaId');
      const slot = parseInt(params.get('slot'));

      if (musicaId && !isNaN(slot)) {
        const musica = todasMusicas.find(m => m.id === musicaId);
        if (musica) {
          musicasSelecionadas[slot] = { titulo: musica.titulo, tom: musica.tom };
          renderizarMusicas();
          salvarEstadoTemporario();
        }
        // Limpa parâmetros da URL
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    function renderizarEquipe() {
      const container = document.getElementById('equipeContainer');
      container.innerHTML = '<h3 style="margin: 20px 0 10px 0;">Equipe de Louvor</h3>';
      if (todosMembros.length === 0) {
        container.innerHTML += '<p style="color:#999;">Nenhum membro cadastrado.</p>';
        return;
      }
      let html = '<div class="equipe-grid">';
      todosMembros.forEach((membro, index) => {
        const checked = escalaAtual?.equipe?.some(m => m.nome === membro.nome) ? 'checked' : '';
        html += `
          <div class="membro-item">
            <div>
              <div class="membro-nome">${membro.nome}</div>
              <div class="membro-funcao">${membro.funcao}</div>
            </div>
            <label class="switch-container">
              <input type="checkbox" class="switch-input" data-index="${index}" ${checked}>
              <span class="switch-toggle"></span>
            </label>
          </div>`;
      });
      html += '</div>';
      container.innerHTML += html;
    }

    async function carregarEscala() {
      getUrlParams();
      await carregarDados();
      preencherTipoCulto();
      preencherNumMusicas();

      const tempCarregado = carregarEstadoTemporario();

      if (!tempCarregado) {
        if (isNovaEscala) {
          musicasSelecionadas = new Array(5).fill(null);
        } else if (escalaId) {
          let docRef = doc(db, "escalasPendentes", escalaId);
          let docSnap = await getDoc(docRef);
          if (!docSnap.exists()) {
            docRef = doc(db, "escalasCulto", escalaId);
            docSnap = await getDoc(docRef);
          }
          if (docSnap.exists()) {
            escalaAtual = docSnap.data();
            musicasSelecionadas = [...(escalaAtual.musicas || [])];
          }
        }
      }

      document.getElementById('data').value = escalaAtual?.data || document.getElementById('data').value || '';
      document.getElementById('tipoCulto').value = escalaAtual?.tipoCulto || '';
      document.getElementById('numMusicas').value = escalaAtual?.numMusicas || 5;
      document.getElementById('observacoes').value = escalaAtual?.observacoes || '';

      renderizarMusicas();
      renderizarEquipe();
      verificarRetornoSelecao();
    }

    window.salvarAlteracoes = async () => {
      salvarEstadoTemporario();

      // ... (código de salvamento mantido igual)
      let tipoCultoFinal = document.getElementById('tipoCulto').value;
      if (tipoCultoFinal === "personalizar") tipoCultoFinal = document.getElementById('tipoCultoPersonalizado').value.trim();

      let numMusicasFinal = parseInt(document.getElementById('numMusicas').value) || 5;
      if (document.getElementById('numMusicas').value === "personalizar") {
        numMusicasFinal = parseInt(document.getElementById('numMusicasPersonalizado').value);
      }

      const equipeSalvar = todosMembros
        .filter((_, i) => document.querySelector(`.switch-input[data-index="${i}"]`)?.checked)
        .map(m => ({ nome: m.nome, funcao: m.funcao }));

      const dados = {
        data: document.getElementById('data').value,
        tipoCulto: tipoCultoFinal,
        numMusicas: numMusicasFinal,
        musicas: musicasSelecionadas.filter(Boolean),
        equipe: equipeSalvar,
        observacoes: document.getElementById('observacoes').value.trim(),
        status: "pendente",
        criadoEm: new Date().toISOString()
      };

      try {
        if (isNovaEscala) {
          await addDoc(collection(db, "escalasPendentes"), dados);
        } else if (escalaId) {
          let docRef = doc(db, "escalasPendentes", escalaId);
          if (!(await getDoc(docRef)).exists()) docRef = doc(db, "escalasCulto", escalaId);
          await updateDoc(docRef, dados);
        }
        sessionStorage.removeItem('escalaEmEdicao');
        alert("✅ Salvo com sucesso!");
        window.location.href = "index.html";
      } catch (e) {
        alert("Erro: " + e.message);
      }
    };

    window.excluirEscala = async function () {
      if (!confirm("Excluir esta escala?")) return;
      sessionStorage.removeItem('escalaEmEdicao');
      await deleteDoc(doc(db, "escalasPendentes", escalaId)).catch(() => {});
      await deleteDoc(doc(db, "escalasCulto", escalaId)).catch(() => {});
      alert("Escala excluída!");
      window.history.back();
    };

    document.addEventListener('change', salvarEstadoTemporario);

    window.onload = carregarEscala;
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #fff; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 1rem; }
    .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 1.5rem; }
    label { display: block; margin: 1.2rem 0 0.5rem; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 0.9rem; border: 2px solid #e2e8f0; border-radius: 10px; }
    .personalizar-container { margin-top: 8px; display: none; }
    .musica-slot { margin-bottom: 1.5rem; }
    .btn-selecionar { padding: 12px 20px; background: #3498db; color: white; border: none; border-radius: 10px; cursor: pointer; }
    button { width: 100%; padding: 1rem; border: none; border-radius: 10px; font-size: 1.1rem; margin-top: 1rem; cursor: pointer; }
    .btn-salvar { background: linear-gradient(135deg, #48bb78, #38a169); color: white; }
    .btn-cancelar { background: #a0aec0; color: white; }
    .btn-excluir { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <div class="card">
      <label>Data do Culto</label>
      <input type="date" id="data">

      <label>Tipo de Culto</label>
      <select id="tipoCulto" onchange="handleTipoCultoChange()"></select>
      <div id="personalizarTipoContainer" class="personalizar-container">
        <input type="text" id="tipoCultoPersonalizado" placeholder="Digite o nome do culto">
      </div>

      <label>Número de Músicas</label>
      <select id="numMusicas" onchange="handleNumMusicasChange()"></select>
      <div id="personalizarNumContainer" class="personalizar-container">
        <input type="number" id="numMusicasPersonalizado" min="1" max="10" placeholder="Quantidade de músicas">
      </div>

      <div id="equipeContainer"></div>

      <label>Músicas</label>
      <div id="musicasContainer"></div>

      <label>Observações</label>
      <textarea id="observacoes" placeholder="Observações opcionais..."></textarea>

      <button class="btn-salvar" onclick="salvarAlteracoes()">Salvar Alterações</button>
      <button class="btn-cancelar" onclick="window.history.back()">Cancelar</button>
      <button id="btn-excluir" class="btn-excluir" onclick="excluirEscala()" style="display:none;">🗑️ Excluir Escala</button>
    </div>
  </div>

  <script src="header.js"></script>
  <script>carregarHeader('Editar Escala');</script>
</body>
</html>
