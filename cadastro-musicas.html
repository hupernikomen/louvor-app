<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Músicas</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons/7.1.0/dist/ionicons/ionicons.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: .5rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #f0f0f0;
    }

    .card h2 {
      color: #2c3e50;
      margin-bottom: 1.5rem;
      font-size: 1.4rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #3498db;
    }

    form {
      display: grid;
      gap: 1.25rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 16px;
      background: #fafbfc;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }

    .btn-excluir {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      padding: 16px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
  </style>

  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc, doc, updateDoc, deleteDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const musicasRef = collection(db, "musicas");
    let musicaEditandoId = null;

    // Função para carregar música por ID (via URL)
    async function carregarMusicaParaEdicao(id) {
      try {
        const musicaDoc = await getDoc(doc(db, "musicas", id));
        if (!musicaDoc.exists()) {
          alert("Música não encontrada!");
          return;
        }

        const musica = musicaDoc.data();
        musicaEditandoId = id;

        document.getElementById('titulo').value = musica.titulo || '';
        document.getElementById('tom').value = musica.tom || '';
        document.getElementById('tags').value = musica.tags || '';
        document.getElementById('observacoes').value = musica.observacoes || '';
        document.getElementById('fase').value = musica.fase || 'pronta';

        document.querySelector('button[type="submit"]').innerHTML = 'Atualizar Música';
        document.getElementById('btn-excluir').style.display = 'block';
        document.querySelector('h2').textContent = 'Editar Música';
      } catch (e) {
        alert("Erro ao carregar música: " + e.message);
      }
    }

    // Carregar música se vier ID na URL
    function verificarEdicaoUrl() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) {
        carregarMusicaParaEdicao(id);
      }
    }

    document.getElementById('formMusica').addEventListener('submit', async (e) => {
      e.preventDefault();

      const musica = {
        titulo: document.getElementById('titulo').value.trim(),
        tom: document.getElementById('tom').value.trim().toUpperCase() || null,
        tags: document.getElementById('tags').value.trim(),
        observacoes: document.getElementById('observacoes').value.trim(),
        fase: document.getElementById('fase').value,
        ultimaUso: null,
        vezesUsada: 0,
        criadoEm: new Date().toISOString().split('T')[0]
      };

      try {
        if (musicaEditandoId) {
          await updateDoc(doc(db, "musicas", musicaEditandoId), musica);
          alert("✅ Música atualizada com sucesso!");
        } else {
          await addDoc(musicasRef, musica);
          alert("✅ Música cadastrada com sucesso!");
        }

        e.target.reset();
        musicaEditandoId = null;
        document.querySelector('button[type="submit"]').innerHTML = 'Salvar Música';
        document.getElementById('btn-excluir').style.display = 'none';
        document.querySelector('h2').textContent = 'Nova Música';
      } catch (error) {
        alert("❌ Erro ao salvar: " + error.message);
      }
    });

    window.excluirMusica = async function () {
      if (!musicaEditandoId) return;
      if (!confirm("Excluir esta música permanentemente?")) return;

      try {
        await deleteDoc(doc(db, "musicas", musicaEditandoId));
        alert("✅ Música excluída com sucesso!");

        musicaEditandoId = null;
        document.querySelector('button[type="submit"]').innerHTML = 'Salvar Música';
        document.getElementById('btn-excluir').style.display = 'none';
        document.querySelector('h2').textContent = 'Nova Música';
        document.getElementById('formMusica').reset();
      } catch (error) {
        alert("❌ Erro ao excluir: " + error.message);
      }
    };

    // Inicialização
    window.onload = () => {
      verificarEdicaoUrl();
    };
  </script>
</head>

<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <div class="card">
      <h2>Nova Música</h2>
      <form id="formMusica">
        <input type="text" id="titulo" required placeholder="Título da música">

        <input type="text" id="tom" placeholder="Tom (Ex: D, C#, Bb)">

        <input type="text" id="tags" placeholder="Tags (separadas por vírgula) - Ex: preludio, ceia, animada">

        <label><strong>Fase da Música</strong></label>
        <select id="fase" required>
          <option value="ensaio">Em Ensaio</option>
          <option value="pronta" selected>Pronta para Culto</option>
        </select>

        <textarea id="observacoes" placeholder="Dicas, arranjos, etc..."></textarea>

        <button type="submit">Salvar Música</button>
        <button type="button" id="btn-excluir" class="btn-excluir" onclick="excluirMusica()" style="display:none;">
          Excluir Música
        </button>
      </form>
    </div>
  </div>

  <script src="header.js"></script>
  <script>carregarHeader('Músicas');</script>
</body>
</html>
