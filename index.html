<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escalas de Louvor</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons/7.1.0/dist/ionicons/ionicons.js"></script>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getMusicas, carregarTodosDados } from './app-state.js';

    let usuarioLogado = false;
    let escalasTodas = [];
    let mostrandoAnteriores = false;

    onAuthStateChanged(auth, (user) => {
      console.log(user);
      
      usuarioLogado = !!(user && user.email === "hupcontato@gmail.com");
      atualizarMenu(user);
    });

    function atualizarMenu() {
      const btnLogin = document.getElementById('btnLogin');
      const menuLogado = document.getElementById('menuLogado');

      if (usuarioLogado) {
        btnLogin.style.display = 'none';
        menuLogado.style.display = 'flex';
      } else {
        btnLogin.style.display = 'inline-block';
        menuLogado.style.display = 'none';
      }
    }

    // ==================== MÚSICAS EM ENSAIO ====================
    async function carregarMusicasEmEnsaio() {
      try {
        await carregarTodosDados();
        const todas = getMusicas();
        const musicas = todas
          .filter(m => m.fase === 'ensaio')
          .sort((a, b) => a.titulo.localeCompare(b.titulo, 'pt-BR'));

        renderizarMusicasEmEnsaio(musicas);
      } catch (e) {
        console.error("Erro ao carregar músicas em ensaio:", e);
      }
    }

    function renderizarMusicasEmEnsaio(musicas) {
      const container = document.getElementById('musicasEnsaioContainer');
      const titulo = document.getElementById('tituloEnsaio');

      if (musicas.length === 0) {
        titulo.innerHTML = `Louvores para Ensaios <span style="font-weight:400; color:#888;">(0)</span>`;
        container.innerHTML = `<p style="color:#888; text-align:center; padding:12px 0;">Nenhuma música em ensaio no momento.</p>`;
        return;
      }

      titulo.innerHTML = `Louvores para ensaios <span style="font-weight:500; color:#e67e22;">(${musicas.length})</span>`;

      let html = '';
      musicas.forEach(m => {
        const versaoHTML = m.versao && m.versao.trim() !== ''
          ? `<div class="versao-musica">${m.versao}</div>`
          : '';
          console.log(usuarioLogado);
          

        const clicavel = usuarioLogado
          ? `onclick="abrirEdicaoMusica('${m.id}')"`
          : '';

        const cursorStyle = usuarioLogado ? 'cursor: pointer;' : 'cursor: default;';

        html += `
          <div class="musica-ensaio-item" ${clicavel} style="${cursorStyle}">
            <div class="musica-titulo">${m.titulo}</div>
            ${versaoHTML}
            ${m.tom ? `<div class="tom-musica">Tom: ${m.tom}</div>` : ''}
          </div>`;
      });
      container.innerHTML = html;
    }

    window.abrirEdicaoMusica = function (id) {
      console.log(id, 'id');
      
      window.open(`cadastro-musicas.html?id=${id}`, '_blank');
    };

    // ==================== ESCALAS ====================
    function ordenarEscalas(escalas) {
      const ordemCultos = {
        "EBD": 1,
        "Louvor e Pregação": 2,
        "Oração e Doutrina": 3,
        "Evento Especial": 4
      };

      return escalas.sort((a, b) => {
        if (a.data !== b.data) return a.data.localeCompare(b.data);
        const ordemA = ordemCultos[a.tipoCulto] || 99;
        const ordemB = ordemCultos[b.tipoCulto] || 99;
        return ordemA - ordemB;
      });
    }

    async function carregarEscalas(mostrarAnteriores = false) {
      mostrandoAnteriores = mostrarAnteriores;
      const feed = document.getElementById('feed');
      const titulo = document.getElementById('tituloFeed');

      feed.innerHTML = '<p class="loading">Carregando escalas...</p>';

      try {
        const escalasRef = collection(db, "escalasCulto");
        const q = query(escalasRef, orderBy("data", "desc"));
        const snapshot = await getDocs(q);

        escalasTodas = [];
        snapshot.forEach(doc => {
          const e = doc.data();
          if (e.status === "aprovada") {
            escalasTodas.push({ id: doc.id, ...e });
          }
        });

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        let escalasFiltradas = [];

        if (mostrarAnteriores) {
          escalasFiltradas = escalasTodas
            .filter(e => new Date(e.data + 'T12:00:00') < hoje)
            .slice(0, 30);
        } else {
          escalasFiltradas = escalasTodas
            .filter(e => new Date(e.data + 'T12:00:00') >= hoje);
        }

        escalasFiltradas = ordenarEscalas(escalasFiltradas);

        if (escalasFiltradas.length === 0) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>${mostrarAnteriores ? 'Nenhuma escala passada encontrada' : 'Não há escalas futuras'}</h2>
              <p>${mostrarAnteriores ? 'As últimas escalas realizadas aparecerão aqui.' : 'As próximas escalas aparecerão aqui assim que forem aprovadas.'}</p>
            </div>`;
          return;
        }

        feed.innerHTML = '';
        escalasFiltradas.forEach(escala => {
          const card = criarEscalaCard(escala, usuarioLogado);
          feed.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p class="error">Erro ao carregar as escalas.</p>';
      }
    }

    window.alternarEscalas = function () {
      carregarEscalas(!mostrandoAnteriores);
    };

    window.abrirSelecionarMusica = function () {
      const width = 820;
      const height = 720;
      const left = (screen.width - width) / 2;
      const top = (screen.height - height) / 2;

      window.open(
        'selecionar-musica.html',
        'SelecionarMusica',
        `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
      );
    };

    window.onload = () => {
      carregarMusicasEmEnsaio();
      carregarEscalas(false);
    };

    window.recarregarPaginaInicial = function () {
      mostrandoAnteriores = false;
      document.getElementById('tituloFeed').textContent = "";
      carregarEscalas(false);
    };
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      padding: 16px 1rem 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      background: #f6f8f9;
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .musicas-ensaio {
    background: #f6f8f9;
      padding: 18px 0 22px 0;
    }

    .musicas-ensaio h3 {
      margin-top: 10px;
      font-weight: 400;
      font-size: 1rem;
      margin-left: 32px;
    }

    #tituloFeed {
      margin: 10px 0 15px 5px;
      color: #2c3e50;
      text-align: center;
    }

    #feed {
      background: #fdfdfd;
      padding: 6px;
      margin-top: -20px;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      box-shadow: 0px -4px 10px rgba(0, 0, 0, 0.06);
    }

    .escala-card {
      margin-bottom: 1.5rem;
      overflow: hidden;
      padding: 6px;
      border-bottom: 1px solid #dadadab6;
    }

    .card-header {
      background: #fff;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tipo-culto { font-size: 0.9rem; font-weight: 500; text-transform: uppercase; }
    .data { font-weight: 500; color: #2c3e50; font-size: 0.85rem; text-transform: uppercase; }
    .musicas { padding: 16px 22px; }
    .musica-item { font-size: 0.95rem; padding: 2px 0; }
    .tom { color: #27ae60; font-weight: 500; }

    .equipe { padding: 0 12px 12px; }
    .membros { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .membro-tag {
      background: #e0e7ee;
      color: #334155;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .observacoes {
      background: #fff;
      padding: 10px 22px;
      border-top: 1px solid #eee;
      color: #222;
      font-size: 0.90rem;
    }

    .scroll-horizontal {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 1rem 0px 1rem 18px;
    }
    .scroll-horizontal::-webkit-scrollbar { display: none; }

    .musica-ensaio-item {
      background: #fff;
      padding: 16px;
      border-radius: 18px;
      white-space: nowrap;
      font-size: 0.95rem;
      transition: all 0.2s;
      box-shadow: 2px 4px 4px rgba(0, 0, 0, 0.06);
    }

    .versao-musica {
      font-size: 0.75rem;
      color: #999;
      font-style: italic;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .tom-musica { font-size: 0.85rem; color: #27ae60; }
    .musica-titulo { font-weight: 400; color: #2c3e50; }

    .loading, .empty-state, .error {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }

    .icon-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      color: #2c3e50;
      padding: 8px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 46px;
      width: 46px;
    }

    .icon-btn:hover {
      background: #f1f3f5;
      color: #3498db;
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="header-left">
      <button onclick="recarregarPaginaInicial()" class="icon-btn" title="Início">
        <ion-icon name="albums-outline"></ion-icon>
      </button>
    </div>

    <div class="header-right">
      <div id="menuLogado" style="display: none; gap: 8px;">

        <a href="menu.html" class="icon-btn" title="Menu Principal">
          <ion-icon name="options-outline"></ion-icon>
        </a>
      </div>

      <button onclick="abrirSelecionarMusica()" class="icon-btn" title="Louvores">
        <ion-icon name="musical-note-outline"></ion-icon>
      </button>

      <button onclick="alternarEscalas()" class="icon-btn" title="Ver Anteriores">
        <ion-icon name="time-outline"></ion-icon>
      </button>

      <a href="login.html" id="btnLogin" class="icon-btn" title="Fazer Login">
        <ion-icon name="lock-open-outline"></ion-icon>
      </a>
    </div>
  </header>

  <div class="container">
    <div class="musicas-ensaio">
      <h3 id="tituloEnsaio">Louvores para ensaios</h3>
      <div id="musicasEnsaioContainer" class="scroll-horizontal"></div>
      <h2 id="tituloFeed" ></h2>
    </div>

    <div id="feed"></div>
  </div>

  <script src="escala-card.js"></script>
</body>

</html>
