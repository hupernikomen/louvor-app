<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escalas de Louvor</title>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let usuarioLogado = false;

    onAuthStateChanged(auth, (user) => {
      usuarioLogado = !!(user && user.email === "hupcontato@gmail.com");
      atualizarMenu(user);
    });

    function atualizarMenu() {
      const btnLogin = document.getElementById('btnLogin');
      const menuLogado = document.getElementById('menuLogado');

      if (usuarioLogado) {
        btnLogin.style.display = 'none';
        menuLogado.style.display = 'flex';
      } else {
        btnLogin.style.display = 'inline-block';
        menuLogado.style.display = 'none';
      }
    }

    async function carregarEscalas() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<p class="loading">Carregando próximas escalas...</p>';

      try {
        const escalasRef = collection(db, "escalasCulto");
        const q = query(escalasRef, orderBy("data"));
        const snapshot = await getDocs(q);

        const escalasAprovadas = [];
        snapshot.forEach(doc => {
          const e = doc.data();
          if (e.status === "aprovada") {
            escalasAprovadas.push({ id: doc.id, ...e });
          }
        });

        if (escalasAprovadas.length === 0) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>Nenhuma escala postada</h2>
              <p>As escalas aparecerão aqui assim que forem criadas.</p>
            </div>`;
          return;
        }

        escalasAprovadas.sort((a, b) => new Date(a.data) - new Date(b.data));

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        feed.innerHTML = '';
        let encontrouFutura = false;

        escalasAprovadas.forEach(escala => {
          if (!escala.data) return;

          const dataEscala = new Date(escala.data + 'T12:00:00');
          if (dataEscala < hoje) return;

          encontrouFutura = true;

          const card = criarEscalaCard(escala, usuarioLogado);   // sem botões
          feed.appendChild(card);
        });

        if (!encontrouFutura) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>Não há escalas futuras aprovadas</h2>
              <p>As próximas escalas aparecerão aqui.</p>
            </div>`;
        }

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p class="error">Erro ao carregar as escalas.</p>';
      }
    }

    window.onload = () => {
      carregarEscalas();
    };
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fc;
      color: #333;
      line-height: 1.6;
    }

    .header {
      position: sticky;
      top: 0;
      padding: 14px 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      z-index: 100;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem;
    }

    .loading,
    .empty-state,
    .error {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }

    .empty-state h2 {
      color: #2c3e50;
      margin-bottom: 12px;
    }

    .btn-login {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      padding: 12px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .escala-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 25px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
    }

    .card-header {
      background: #fff;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tipo-culto {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .data {
      font-weight: 500;
      color: #2c3e50;
      font-size: 0.80rem;
       text-transform: uppercase;
    }

    .musicas {
      padding: 16px 22px;
    }

    .musica-item {
      font-size: 0.92rem;
    }

    .musica-item:last-child {
      border-bottom: none;
    }

    .tom {
      color: #27ae60;
      font-weight: 500;
    }

    .equipe {
      padding: 18px 12px;
    }

    .membros {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .membro-tag {
      background: #f7fbff;
      color: #334155;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .observacoes {
      background: #fff;
      padding: 10px 22px;
      border-top: 1px solid #eee;
      color: #222;
      font-size: 0.90rem;
    }

    /* Ajustes para pendentes */
    .escala-card.pendente .card-header h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #2c3e50;
      margin: 0;
    }

    .escala-card.pendente .musica-item {
      margin-left: 0;
    }

    .equipe-pendente {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 15px;
      padding: 0 18px 20px;
    }

    .btn-aprovar,
    .btn-editar {
      font-size: 0.85rem;
      padding: 11px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-aprovar {
      background: #28a74599;
      color: white;
    }

    .btn-editar {
      background: #ffc10799;
      color: #212529;
    }

  </style>
</head>

<body>
  <header class="header">
    <h1 style="font-size: 1.7rem; margin: 0;"></h1>
    <div>
      <a href="login.html" class="btn-login" id="btnLogin">Login</a>
      <div id="menuLogado" style="display:none; gap:10px;">
        <a href="menu.html" class="btn-login">Menu</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="feed"></div>
  </div>

  <!-- Card Unificado com CSS -->
  <script src="escala-card.js"></script>
</body>

</html>
