<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalas de Louvor</title>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let usuarioLogado = false;

    onAuthStateChanged(auth, (user) => {
      usuarioLogado = !!(user && user.email === "hupcontato@gmail.com");
      atualizarMenu(user);
    });

    function atualizarMenu() {
      const btnLogin = document.getElementById('btnLogin');
      const menuLogado = document.getElementById('menuLogado');

      if (usuarioLogado) {
        btnLogin.style.display = 'none';
        menuLogado.style.display = 'flex';
      } else {
        btnLogin.style.display = 'inline-block';
        menuLogado.style.display = 'none';
      }
    }

    // Retorna cor para o badge .tipo-culto
    function getTipoCultoColor(tipo) {
      const t = (tipo || "").toLowerCase().trim();
      
      if (t.includes("louvor") || t.includes("pregação")) return "#e74c3c99";   // Vermelho
      if (t.includes("oração") || t.includes("doutrina")) return "#27ae6099";   // Verde
      if (t.includes("ebd")) return "#3498db99";                                // Azul
      if (t.includes("evento")) return "#9b59b699";                             // Roxo
      if (t.includes("especial")) return "#f39c1299";                           // Laranja/Dourado
      return "#34495e99";                                                       // Cor padrão (cinza escuro)
    }

    async function carregarEscalas() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<p class="loading">Carregando próximas escalas...</p>';

      try {
        const escalasRef = collection(db, "escalasCulto");
        const q = query(escalasRef, orderBy("data"));
        const snapshot = await getDocs(q);

        const escalasAprovadas = [];
        snapshot.forEach(doc => {
          const e = doc.data();
          if (e.status === "aprovada") {
            escalasAprovadas.push({ id: doc.id, ...e });
          }
        });

        if (escalasAprovadas.length === 0) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>Nenhuma escala postada</h2>
              <p>As escalas aparecerão aqui assim que forem criadas.</p>
            </div>`;
          return;
        }

        escalasAprovadas.sort((a, b) => new Date(a.data) - new Date(b.data));

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        feed.innerHTML = '';
        let encontrouFutura = false;

        escalasAprovadas.forEach(escala => {
          if (!escala.data) return;

          const dataEscala = new Date(escala.data + 'T12:00:00');
          if (dataEscala < hoje) return;

          encontrouFutura = true;

          const dataFormatada = dataEscala.toLocaleDateString('pt-BR', {
            weekday: 'short',
            day: '2-digit',
            month: 'short'
          });

          const corBadge = getTipoCultoColor(escala.tipoCulto);

          const card = document.createElement('div');
          card.className = 'escala-card';

          if (usuarioLogado) {
            card.style.cursor = 'pointer';
            card.onclick = () => window.location.href = `editar-escala.html?id=${escala.id}`;
          }

          card.innerHTML = `
            <div class="card-header">
              <span class="tipo-culto" style="background: ${corBadge};">${escala.tipoCulto}</span>
              <span class="data">${dataFormatada}</span>
            </div>

            <div class="musicas">
              ${escala.musicas.map(m => `
                <div class="musica-item">
                  ${m.titulo} ${m.tom ? `<span class="tom">(${m.tom})</span>` : ''}
                </div>
              `).join('')}
            </div>

            <div class="equipe">
              <div class="membros">
                ${escala.equipe.map(m => `<span class="membro-tag">${m.nome}</span>`).join('')}
              </div>
            </div>

            ${escala.observacoes ? `
              <div class="observacoes">
                <strong>Obs.:</strong> ${escala.observacoes}
              </div>` : ''}
          `;

          feed.appendChild(card);
        });

        if (!encontrouFutura) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>Não há escalas futuras aprovadas</h2>
              <p>As próximas escalas aparecerão aqui.</p>
            </div>`;
        }

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p class="error">Erro ao carregar as escalas.</p>';
      }
    }

    window.onload = () => {
      carregarEscalas();
    };
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fc;
      color: #333;
      line-height: 1.6;
    }

    .header {
      position: sticky;
      background: #f8f9fa;
      top: 0;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      z-index: 100;
    }

    .container { 
      max-width: 1000px; 
      margin: 0 auto; 
      padding: 0.5rem; 
    }

    .escala-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 35px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
    }

    .card-header {
      background: #f1f5f9;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .tipo-culto {
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      color: white;
    }

    .data {
      font-weight: 600;
      color: #2c3e50;
      font-size: 0.95rem;
    }

    .musicas {
      padding: 16px 20px;
    }

    .musica-item {
      border-bottom: 1px solid #f5f5f5;
      font-size: 1rem;
      margin-left: 12px;
    }

    .musica-item:last-child {
      border-bottom: none;
    }

    .tom {
      color: #27ae60;
      font-weight: 500;
    }

    .equipe {
      padding: 0 20px 20px;
    }

    .membros {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 8px;
    }

    .membro-tag {
      background: #f1f5f9;
      color: #334155;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .observacoes {
      background: #fff8e1;
      padding: 16px 20px;
      border-top: 1px solid #ffeaa7;
      color: #5d4037;
      font-size: 0.95rem;
    }

    .loading, .empty-state, .error {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }

    .empty-state h2 {
      color: #2c3e50;
      margin-bottom: 12px;
    }

    .btn-login {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <header class="header">
    <h1 style="font-size: 1.7rem; margin: 0;"></h1>
    <div>
      <a href="login.html" class="btn-login" id="btnLogin">Login</a>
      <div id="menuLogado" style="display:none; gap:10px;">
        <a href="menu.html" class="btn-login">Menu</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="feed"></div>
  </div>
</body>
</html>
