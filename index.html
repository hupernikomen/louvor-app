<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalas de Louvor</title>
  <link rel="stylesheet" href="style.css">
  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const escalasRef = collection(db, "escalasCulto");

    async function carregarEscalas() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<p style="text-align:center; padding:80px 20px; color:#888;">Carregando escalas recentes...</p>';

      try {
        const q = query(escalasRef, orderBy("criadoEm", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          feed.innerHTML = `
            <div style="text-align:center; padding:100px 20px; color:#999;">
              <h2>Nenhuma escala encontrada</h2>
              <p style="margin-top:10px;">As escalas geradas aparecerão aqui.</p>
            </div>`;
          return;
        }

        feed.innerHTML = '';

        snapshot.forEach(doc => {
          const e = doc.data();

          const card = document.createElement('div');
          card.className = 'escala-card';
          card.innerHTML = `
            <div class="card-header">
              <span class="tipo-culto">${e.tipoCulto.replace('_', ' ').toUpperCase()}</span>
              <div>
                <span class="data">${new Date(e.data).toLocaleDateString('pt-BR', { 
                  weekday: 'long', 
                  day: '2-digit', 
                  month: 'long' 
                })}</span>
              </div>
            </div>

            <div class="musicas">
              <div class="musica-list">
                ${e.musicas.map(m => `
                  <div class="musica-item">
                    <span class="titulo">${m.titulo} ${m.tom ? `- ${m?.tom}` : ''}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="equipe">
              <div class="membros">
                ${e.equipe.map(m => `
                  <span class="membro-tag">${m.nome} <small>(${m.funcao})</small></span>
                `).join('')}
              </div>
            </div>

            ${e.observacoes ? `
              <div class="observacoes">
                <strong>Observação:</strong> ${e.observacoes}
              </div>` : ''}
          `;
          feed.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p style="color:red; text-align:center; padding:40px;">Erro ao carregar as escalas.</p>';
      }
    }

    window.onload = carregarEscalas;
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fc;
      color: #333;
      line-height: 1.6;
    }

    /* Header Fixo e Elegante */
    .header {
      position: sticky;
      top: 0;
      background: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 100;
    }

    .header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      color: #2c3e50;
    }

    .btn-login {
      background: #3498db;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #2980b9;
    }

    .container {
      padding: 20px 18px;
      max-width: 100%;
    }

    /* Card Elegante e Minimalista */
    .escala-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
      margin-bottom: 24px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
    }

    .card-header {
      background: #f8f9fc;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .data {
      font-weight: 600;
      color: #2c3e50;
      font-size: 1.05rem;
    }

    .tipo-culto {
      background: #e3f2fd;
      color: #1565c0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .musicas {
      padding: 20px;
    }

    .musicas h4 {
      color: #455a64;
      margin-bottom: 14px;
      font-size: 1.05rem;
    }

    .musica-list {
      display: flex;
      flex-direction: column;
      /* gap: 12px; */
    }

    .musica-item {
      border-bottom: 1px solid #f5f5f5;
    }

    .musica-item:last-child {
      border-bottom: none;
    }

    .titulo {
      display: block;
      margin-bottom: 4px;
      color: #263238;
    }

    .info {
      font-size: 0.9rem;
      color: #546e7a;
    }

    .equipe {
      padding: 0 20px 20px 20px;
    }

    .equipe h4 {
      color: #455a64;
      margin-bottom: 12px;
    }

    .membros {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .membro-tag {
      background: #f1f5f9;
      color: #334155;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.88rem;
    }

    .observacoes {
      background: #fff8e1;
      padding: 16px 20px;
      border-top: 1px solid #ffeaa7;
      color: #5d4037;
      font-size: 0.95rem;
    }

    /* Responsividade */
    @media (max-width: 480px) {
      .container {
        padding: 16px 14px;
      }
      .header {
        padding: 14px 18px;
      }
    }
  </style>
</head>
<body>
  <!-- Header Fixo -->
  <header class="header">
    <h1>Escalas de Louvor</h1>
    <a href="login.html" class="btn-login">🔑 Login</a>
  </header>

  <div class="container">
    <div id="feed"></div>
  </div>
</body>
</html>
