<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <title>Escalas Pendentes - Aprovar</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0.5rem;
    }

    .btn-nova, .btn-gerar {
      background: linear-gradient(135deg, #6f42c1, #8e5cf7);
      color: white;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-gerar {
      background: linear-gradient(135deg, #f39c12, #e67e22);
    }

    .btn-nova:hover, .btn-gerar:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .loading, .info {
      text-align: center;
      padding: 4rem 2rem;
      color: #666;
      font-size: 1.1rem;
    }

    .escala-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      margin-bottom: 25px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
    }

    /* ... (mantém o resto do CSS igual) ... */
    .card-header { background: #f1f5f9; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
    .tipo-culto { padding: 5px 11px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; color: white; }
    .musicas { padding: 16px 18px; }
    .musica-item { border-bottom: 1px solid #f5f5f5; font-size: 0.92rem; padding: 7px 0; }
    .musica-item:last-child { border-bottom: none; }
    .tom { color: #27ae60; font-weight: 500; }
    .equipe { padding: 0 18px 18px; }
    .membros { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .membro-tag { background: #f1f5f9; color: #334155; padding: 5px 11px; border-radius: 20px; font-size: 0.84rem; }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px; padding: 0 18px 20px; }
    .btn-aprovar { background: #28a745; color: white; padding: 11px 20px; border: none; border-radius: 8px; font-weight: 600; }
    .btn-editar { background: #ffc107; color: #212529; padding: 11px 20px; border: none; border-radius: 8px; font-weight: 600; }
  </style>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import {
      collection, getDocs, doc, addDoc, getDoc, deleteDoc, updateDoc, query, where
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let todasMusicas = [];
    let escalasAprovadas = [];

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== "hupcontato@gmail.com") {
        window.location.href = "login.html";
      }
    });

    async function carregarDadosBase() {
      const musSnap = await getDocs(collection(db, "musicas"));
      todasMusicas = musSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      const aprovSnap = await getDocs(collection(db, "escalasCulto"));
      escalasAprovadas = aprovSnap.docs.map(d => d.data());
    }

    window.criarNovaEscalaManual = function () {
      window.location.href = `editar-escala.html?nova=true`;
    };

    // ====================== FUNÇÃO PARA GERAR/REGENERAR SUGESTÃO ======================
    window.gerarSugestaoEscala = async function () {
      // if (!confirm("Gerar nova sugestão de escala?\n\nSe já existir uma pendente, ela será excluída e substituída por uma nova.")) {
      //   return;
      // }

      const pendentesSnap = await getDocs(collection(db, "escalasPendentes"));

      // Exclui todas as escalas pendentes existentes (para evitar duplicatas)
      for (const docSnap of pendentesSnap.docs) {
        await deleteDoc(doc(db, "escalasPendentes", docSnap.id));
      }

      // Agora gera uma nova sugestão
      await gerarNovaSugestao();
      await carregarEscalasPendentes();
    };

    async function gerarNovaSugestao() {
      let ultimaEscala = null;
      if (escalasAprovadas.length > 0) {
        escalasAprovadas.sort((a, b) => new Date(b.data) - new Date(a.data));
        ultimaEscala = escalasAprovadas[0];
      }

      let ultimaData = ultimaEscala ? new Date(ultimaEscala.data) : new Date();
      ultimaData.setHours(0, 0, 0, 0);

      const cultosSnap = await getDocs(collection(db, "cultosFixos"));
      const cultosFixos = cultosSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      for (let i = 1; i <= 60; i++) {
        const dataFuturo = new Date(ultimaData);
        dataFuturo.setDate(ultimaData.getDate() + i);
        const dataStr = dataFuturo.toISOString().split('T')[0];
        const diaSemana = dataFuturo.getDay();

        // Verifica se já existe pendente ou aprovada nessa data
        const qPend = await getDocs(query(collection(db, "escalasPendentes"), where("data", "==", dataStr)));
        const jaAprovada = escalasAprovadas.some(e => e.data === dataStr);

        if (!qPend.empty || jaAprovada) continue;

        const cultoMatch = cultosFixos.find(c => c.diaSemana === diaSemana);
        if (!cultoMatch) continue;

        let musicasSelecionadas = [];

        // Regra especial para Oração e Doutrina
        if (cultoMatch.nome.toLowerCase().includes("oração") || cultoMatch.nome.toLowerCase().includes("doutrina")) {
          if (ultimaEscala && ultimaEscala.musicas && ultimaEscala.musicas.length >= 2) {
            const anteriores = ultimaEscala.musicas;
            const musica1 = anteriores[Math.floor(Math.random() * 2)];
            const musica2 = anteriores[anteriores.length - 2 + Math.floor(Math.random() * 2)];
            musicasSelecionadas = [musica1, musica2].filter(Boolean);
          }
        }

        // Completa com base no score
        if (musicasSelecionadas.length < cultoMatch.numMusicas) {
          const restantes = cultoMatch.numMusicas - musicasSelecionadas.length;

          const musicasComScore = todasMusicas
            .filter(m => !musicasSelecionadas.some(sel => sel.titulo === m.titulo))
            .map(m => ({ ...m, score: calcularScoreMusica(m) }))
            .sort((a, b) => b.score - a.score);

          const complementares = musicasComScore.slice(0, restantes);
          musicasSelecionadas = [...musicasSelecionadas, ...complementares.map(m => ({ titulo: m.titulo, tom: m.tom }))];
        }

        const membrosSnap = await getDocs(collection(db, "membrosEquipe"));
        const equipe = membrosSnap.docs.slice(0, 10).map(d => ({
          nome: d.data().nome,
          funcao: d.data().funcao
        }));

        const novaEscala = {
          data: dataStr,
          tipoCulto: cultoMatch.nome,
          numMusicas: cultoMatch.numMusicas,
          musicas: musicasSelecionadas,
          equipe: equipe,
          status: "pendente",
          criadoEm: new Date().toISOString()
        };

        await addDoc(collection(db, "escalasPendentes"), novaEscala);
        console.log(`✅ Nova sugestão gerada: ${dataStr} - ${cultoMatch.nome}`);
        break;
      }
    }

    function calcularScoreMusica(musica) {
      const ultimaUso = musica.ultimaUso ? new Date(musica.ultimaUso) : new Date(0);
      const diasDesdeUltima = Math.floor((Date.now() - ultimaUso) / 86400000);
      const vezesUsada = musica.vezesUsada || 0;
      return Math.round((diasDesdeUltima * 10) + (500 / (vezesUsada + 1)));
    }

    async function carregarEscalasPendentes() {
      const container = document.getElementById('pendentesContainer');
      container.innerHTML = '<div class="loading">Carregando escalas pendentes...</div>';

      const snapshot = await getDocs(collection(db, "escalasPendentes"));
      let pendentes = [];

      snapshot.forEach(doc => pendentes.push({ id: doc.id, ...doc.data() }));

      pendentes.sort((a, b) => new Date(a.data || 0) - new Date(b.data || 0));

      if (pendentes.length === 0) {
        container.innerHTML = `<div class="info">Nenhuma escala pendente.<br>Clique em "Gerar Sugestão" para criar uma.</div>`;
        return;
      }

      container.innerHTML = '';
      pendentes.forEach(escala => {
        const card = criarEscalaCard(escala, true, `aprovarEscala('${escala.id}')`, `editarEscala('${escala.id}')`);
        container.appendChild(card);
      });
    }

    window.aprovarEscala = async function (id) {
      if (!confirm('Aprovar esta escala e publicá-la?')) return;

      const escalaRef = doc(db, "escalasPendentes", id);
      const snap = await getDoc(escalaRef);
      if (!snap.exists()) return;

      const escala = snap.data();

      // Atualiza estatísticas das músicas
      for (const musica of escala.musicas || []) {
        const musRef = todasMusicas.find(m => m.titulo === musica.titulo);
        if (musRef?.id) {
          await updateDoc(doc(db, "musicas", musRef.id), {
            ultimaUso: escala.data,
            vezesUsada: (musRef.vezesUsada || 0) + 1
          });
        }
      }

      await addDoc(collection(db, "escalasCulto"), {
        ...escala,
        status: "aprovada",
        aprovadaEm: new Date().toISOString()
      });

      await deleteDoc(escalaRef);

      alert("✅ Escala aprovada e publicada!");

      await carregarDadosBase();
      await carregarEscalasPendentes();
    };

    window.editarEscala = function (id) {
      window.location.href = `editar-escala.html?id=${id}`;
    };

    window.onload = async () => {
      await carregarDadosBase();
      await carregarEscalasPendentes();   // ← Agora só carrega, não gera mais automaticamente
    };
  </script>
</head>

<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <button onclick="criarNovaEscalaManual()" class="btn-nova">
      <ion-icon name="add-circle-outline"></ion-icon>
      Nova Escala Manual
    </button>

    <button onclick="gerarSugestaoEscala()" class="btn-gerar">
      <ion-icon name="sparkles-outline"></ion-icon>
      Gerar Sugestão de Escala
    </button>

    <div id="pendentesContainer"></div>
  </div>

  <script src="header.js"></script>
  <script src="escala-card.js"></script>
  <script>carregarHeader('Pendentes');</script>
</body>
</html>
