<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalas de Louvor</title>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let usuarioLogado = false;

    onAuthStateChanged(auth, (user) => {
      usuarioLogado = !!(user && user.email === "hupcontato@gmail.com");
      atualizarMenu(user);
    });

    function atualizarMenu() {
      const btnLogin = document.getElementById('btnLogin');
      const menuLogado = document.getElementById('menuLogado');
      
      if (usuarioLogado) {
        btnLogin.style.display = 'none';
        menuLogado.style.display = 'flex';
      } else {
        btnLogin.style.display = 'inline-block';
        menuLogado.style.display = 'none';
      }
    }

    async function carregarEscalas() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<p class="loading">Carregando próximas escalas...</p>';

      try {
        const escalasRef = collection(db, "escalasCulto");
        const q = query(escalasRef, orderBy("data"));
        const snapshot = await getDocs(q);

        const escalasAprovadas = [];
        snapshot.forEach(doc => {
          const e = doc.data();
          if (e.status === "aprovada") {
            escalasAprovadas.push({ id: doc.id, ...e });
          }
        });

        if (escalasAprovadas.length === 0) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>Nenhuma escala aprovada ainda</h2>
              <p>As escalas aparecerão aqui assim que forem aprovadas.</p>
            </div>`;
          return;
        }

        // Ordena por data (mais próxima primeiro)
        escalasAprovadas.sort((a, b) => new Date(a.data) - new Date(b.data));

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        feed.innerHTML = '';

        let encontrouFutura = false;

        escalasAprovadas.forEach(escala => {
          if (!escala.data) return;

          const dataEscala = new Date(escala.data + 'T12:00:00');
          if (dataEscala < hoje) return; // só futuras

          encontrouFutura = true;

          const dataFormatada = dataEscala.toLocaleDateString('pt-BR', { 
            weekday: 'short', 
            day: '2-digit', 
            month: 'short'
          });

          const card = document.createElement('div');
          card.className = 'escala-card';

          if (usuarioLogado) {
            card.style.cursor = 'pointer';
            card.onclick = () => window.location.href = `editar-escala.html?id=${escala.id}`;
          }

          card.innerHTML = `
            <div class="card-header">
              <span class="tipo-culto">${escala.tipoCulto}</span>
              <span class="data">${dataFormatada}</span>
            </div>

            <div class="musicas">
              ${escala.musicas.map(m => `
                <div class="musica-item">
                  ${m.titulo} ${m.tom ? `<span class="tom">(${m.tom})</span>` : ''}
                </div>
              `).join('')}
            </div>

            <div class="equipe">
              <strong>Equipe:</strong>
              <div class="membros">
                ${escala.equipe.map(m => `<span class="membro-tag">${m.nome}</span>`).join('')}
              </div>
            </div>

            ${escala.observacoes ? `
              <div class="observacoes">
                <strong>Obs.:</strong> ${escala.observacoes}
              </div>` : ''}
          `;

          feed.appendChild(card);
        });

        if (!encontrouFutura) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>Não há escalas futuras aprovadas</h2>
              <p>As próximas escalas aparecerão aqui.</p>
            </div>`;
        }

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p class="error">Erro ao carregar as escalas.</p>';
      }
    }

    window.onload = () => {
      carregarEscalas();
    };
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fc;
      color: #333;
      line-height: 1.6;
    }
    .header {
      position: sticky;
      background: #f8f9fa;
      top: 0;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      z-index: 100;
    }
    .container {
      max-width: 100%;
      margin: 0;
      padding: 22px;
    }
    .escala-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.06);
      margin-bottom: 35px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
    }
    .card-header {
      background: #f1f5f9;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }
    .tipo-culto {
      background: #3498db;
      color: #fff;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .data {
      font-weight: 600;
      color: #2c3e50;
      font-size: 0.95rem;
    }
    .musicas {
      padding: 20px;
    }
    .musica-item {
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 1rem;
    }
    .musica-item:last-child { border-bottom: none; }
    .tom { color: #27ae60; font-weight: 500; }
    .equipe {
      padding: 0 20px 20px;
    }
    .membros {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .membro-tag {
      background: #f1f5f9;
      color: #334155;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
    .observacoes {
      background: #fff8e1;
      padding: 16px 20px;
      border-top: 1px solid #ffeaa7;
      color: #5d4037;
      font-size: 0.95rem;
    }
    .loading, .empty-state, .error {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }
    .empty-state h2 { color: #2c3e50; margin-bottom: 12px; }
    .btn-login {
      background: #3498db;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <p><strong>Escala de Louvor</strong></p>
    <div>
      <a href="login.html" class="btn-login" id="btnLogin">Login</a>
      <div id="menuLogado" style="display:none; gap:10px;">
        <a href="menu.html" class="btn-login">Menu Admin</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="feed"></div>
  </div>
</body>
</html>
