<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Músicas</title>
  <link rel="stylesheet" href="style.css">
  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const musicasRef = collection(db, "musicas");
    let musicaEditandoId = null;

    async function carregarMusicas() {
      const tbody = document.querySelector('#tabelaMusicas tbody');
      tbody.innerHTML = '';

      const snapshot = await getDocs(musicasRef);
      snapshot.forEach((docSnap) => {
        const m = docSnap.data();
        const id = docSnap.id;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${m.titulo}</td>
          <td>${m.tom || '-'}</td>
          <td style="text-align:center;">${m.nivelAnimacao}</td>
          <td>${m.slotPreferido || '-'}</td>
          <td>${m.prioridade || '-'}</td>
          <td>
            <button onclick="editarMusica('${id}')" style="background:#f39c12; color:white; padding:5px 10px;">Editar</button>
            <button onclick="excluirMusica('${id}')" style="background:#e74c3c; color:white; padding:5px 10px;">Excluir</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.editarMusica = async function(id) {
      const snapshot = await getDocs(musicasRef);
      const musica = snapshot.docs.find(d => d.id === id).data();

      document.getElementById('titulo').value = musica.titulo || '';
      document.getElementById('tom').value = musica.tom || '';
      document.getElementById('nivelAnimacao').value = musica.nivelAnimacao || '';
      document.getElementById('slotPreferido').value = musica.slotPreferido || '';
      document.getElementById('prioridade').value = musica.prioridade || 5;
      document.getElementById('observacoes').value = musica.observacoes || '';

      musicaEditandoId = id;
      document.querySelector('button[type="submit"]').textContent = "Atualizar Música";
    };

    document.getElementById('formMusica').addEventListener('submit', async (e) => {
      e.preventDefault();

      const musica = {
        titulo: document.getElementById('titulo').value.trim(),
        tom: document.getElementById('tom').value.trim().toUpperCase() || null,
        nivelAnimacao: document.getElementById('nivelAnimacao').value,
        slotPreferido: document.getElementById('slotPreferido').value,
        prioridade: parseInt(document.getElementById('prioridade').value),
        observacoes: document.getElementById('observacoes').value.trim(),
        ultimaUso: null,
        vezesUsada: 0,
        criadoEm: new Date().toISOString().split('T')[0]
      };

      if (musicaEditandoId) {
        await updateDoc(doc(db, "musicas", musicaEditandoId), musica);
        alert("Música atualizada!");
        musicaEditandoId = null;
        document.querySelector('button[type="submit"]').textContent = "Salvar Música";
      } else {
        await addDoc(musicasRef, musica);
        alert("Música cadastrada!");
      }

      e.target.reset();
      carregarMusicas();
    });

    window.excluirMusica = async function(id) {
      if (confirm("Excluir esta música?")) {
        await deleteDoc(doc(db, "musicas", id));
        carregarMusicas();
      }
    };

    window.onload = carregarMusicas;
  </script>
</head>
<body>
  <div class="container">
    <h1>🎵 Cadastro de Músicas</h1>

    <div class="card">
      <h2>Nova Música</h2>
      <form id="formMusica">
        <label>Título *</label>
        <input type="text" id="titulo" required>

        <label>Tom (opcional)</label>
        <input type="text" id="tom" placeholder="Ex: D">

        <label>Nível de Animação *</label>
        <select id="nivelAnimacao" required>
          <option value="">Selecione...</option>
          <option value="calma">Calma / Suave</option>
          <option value="moderada">Moderada</option>
          <option value="animada">Animada</option>
        </select>

        <label>Slot Preferido</label>
        <select id="slotPreferido">
          <option value="">Nenhum</option>
          <option value="preludio">Prelúdio</option>
          <option value="abertura">Abertura</option>
          <option value="principal">Principal</option>
          <option value="oferta">Oferta</option>
          <option value="ceia">Ceia</option>
          <option value="final">Final</option>
        </select>

        <label>Prioridade (1 a 10) *</label>
        <input type="number" id="prioridade" min="1" max="10" value="5" required>

        <label>Observações</label>
        <textarea id="observacoes" rows="3"></textarea>

        <button type="submit">Salvar Música</button>
      </form>
    </div>

    <div class="card">
      <h2>Músicas Cadastradas</h2>
      <table id="tabelaMusicas">
        <thead>
          <tr>
            <th>Título</th>
            <th>Tom</th>
            <th>Nível</th>
            <th>Slot</th>
            <th>Prioridade</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <a href="index.html">← Voltar</a>
  </div>
</body>
</html>
