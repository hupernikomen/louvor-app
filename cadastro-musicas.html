<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Músicas</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: .5rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      margin-bottom: 2rem;
      border: 1px solid #f0f0f0;
    }

    .card h2 {
      color: #2c3e50;
      margin-bottom: 1.5rem;
      font-size: 1.4rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #3498db;
    }

    form {
      display: grid;
      gap: 1rem;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: #f9f9f9;
    }

    input:focus, textarea:focus {
      outline: none;
      border: 2px solid #3498db;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }

    th {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      font-weight: 600;
      text-transform: uppercase;
    }

    .btn-tabela {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 48px;
      height: 30px;
    }

    .btn-tabela.editar {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
    }

    .btn-excluir {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      padding: 16px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .tags {
      font-size: 0.85rem;
      color: #555;
      background: #f0f0f0;
      padding: 4px 8px;
      border-radius: 12px;
      display: inline-block;
      margin: 2px;
    }
  </style>

  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const musicasRef = collection(db, "musicas");
    let musicaEditandoId = null;

    async function carregarMusicas() {
      const tbody = document.querySelector('#tabelaMusicas tbody');
      tbody.innerHTML = '';

      const snapshot = await getDocs(musicasRef);
      let musicas = [];
      snapshot.forEach((docSnap) => {
        musicas.push({ id: docSnap.id, ...docSnap.data() });
      });

      musicas.sort((a, b) => a.titulo.localeCompare(b.titulo, 'pt-BR'));

      musicas.forEach((m) => {
        const id = m.id;
        const tagsHTML = m.tags 
          ? m.tags.split(',').map(tag => `<span class="tags">${tag.trim()}</span>`).join('') 
          : '-';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight: 400; color: #2c3e50;">${m.titulo}</td>
          <td style="color: #27ae60; font-weight: 500;">${m.tom || '-'}</td>
          <td>${tagsHTML}</td>
          <td style="text-align:center;">
            <button onclick="editarMusica('${id}')" class="btn-tabela editar" title="Editar">
              <ion-icon name="create-outline"></ion-icon>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.editarMusica = async function (id) {
      const snapshot = await getDocs(musicasRef);
      const musica = snapshot.docs.find(d => d.id === id).data();

      document.getElementById('titulo').value = musica.titulo || '';
      document.getElementById('tom').value = musica.tom || '';
      document.getElementById('tags').value = musica.tags || '';
      document.getElementById('observacoes').value = musica.observacoes || '';

      musicaEditandoId = id;
      document.querySelector('button[type="submit"]').innerHTML = 'Atualizar Música';
      document.getElementById('btn-excluir').style.display = 'block';
    };

    document.getElementById('formMusica').addEventListener('submit', async (e) => {
      e.preventDefault();

      const musica = {
        titulo: document.getElementById('titulo').value.trim(),
        tom: document.getElementById('tom').value.trim().toUpperCase() || null,
        tags: document.getElementById('tags').value.trim(),
        observacoes: document.getElementById('observacoes').value.trim(),
        ultimaUso: null,
        vezesUsada: 0,
        criadoEm: new Date().toISOString().split('T')[0]
      };

      try {
        if (musicaEditandoId) {
          await updateDoc(doc(db, "musicas", musicaEditandoId), musica);
          alert("✅ Música atualizada!");
          musicaEditandoId = null;
          document.querySelector('button[type="submit"]').innerHTML = 'Salvar Música';
          document.getElementById('btn-excluir').style.display = 'none';
        } else {
          await addDoc(musicasRef, musica);
          alert("Música cadastrada com sucesso!");
        }

        e.target.reset();
        carregarMusicas();
      } catch (error) {
        alert("❌ Erro: " + error.message);
      }
    });

    window.excluirMusica = async function () {
      if (!musicaEditandoId) return;
      if (!confirm("Excluir esta música permanentemente?")) return;

      await deleteDoc(doc(db, "musicas", musicaEditandoId));
      alert("Música excluída!");

      musicaEditandoId = null;
      document.querySelector('button[type="submit"]').innerHTML = 'Salvar Música';
      document.getElementById('btn-excluir').style.display = 'none';
      document.getElementById('formMusica').reset();
      carregarMusicas();
    };

    window.onload = carregarMusicas;
  </script>
</head>

<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <div class="card">
      <h2>Nova Música</h2>
      <form id="formMusica">
        <input type="text" id="titulo" required placeholder="Título da música">

        <input type="text" id="tom" placeholder="Tom (Ex: D, C#, Bb)">

        <input type="text" id="tags" placeholder="Tags (separadas por vírgula) - Ex: preludio, ceia, animada">

        <textarea id="observacoes" placeholder="Dicas, arranjos, etc..."></textarea>

        <button type="submit">Salvar Música</button>
        <button type="button" id="btn-excluir" class="btn-excluir" onclick="excluirMusica()" style="display:none;">
          Excluir Música
        </button>
      </form>
    </div>

    <div class="card">
      <h2>Músicas Cadastradas</h2>
      <table id="tabelaMusicas">
        <thead>
          <tr>
            <th>Título</th>
            <th>Tom</th>
            <th>Tags</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="header.js"></script>
  <script>carregarHeader('Músicas');</script>
</body>
</html>
