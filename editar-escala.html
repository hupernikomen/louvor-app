<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Escala - Louvor</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons/7.1.0/dist/ionicons/ionicons.js"></script>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { doc, getDoc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { getMusicas, getMembros, getCultosFixos, carregarTodosDados } from './app-state.js';  // ← ALTERADO

    let escalaId = null;
    let escalaAtual = null;
    let todasMusicas = [];
    let todosMembros = [];
    let cultosFixos = [];
    let isNovaEscala = false;
    let musicasSelecionadas = [];

    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      escalaId = params.get('id');
      isNovaEscala = params.get('nova') === 'true';
    }

    async function carregarDados() {
      try {
        await carregarTodosDados();   // ← Garante carregamento único

        todasMusicas = getMusicas();
        todosMembros = getMembros();
        cultosFixos = getCultosFixos();

        preencherTipoCulto();
      } catch (e) {
        console.error("Erro ao carregar dados:", e);
      }
    }

    function preencherTipoCulto() {
      const select = document.getElementById('tipoCulto');
      select.innerHTML = '<option value="">Selecione o tipo de culto...</option>';
      cultosFixos.forEach(c => {
        select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
      });
      select.innerHTML += `<option value="personalizar">Personalizar...</option>`;
    }

    function handleTipoCultoChange() {
      const valor = document.getElementById('tipoCulto').value;
      document.getElementById('personalizarTipoContainer').style.display = valor === "personalizar" ? 'block' : 'none';
    }

    function renderizarMusicas() {
      const container = document.getElementById('musicasContainer');
      container.innerHTML = '';

      musicasSelecionadas.forEach((musica, index) => {
        const nome = musica ? `${musica.titulo} ${musica.tom ? `(${musica.tom})` : ''}` : 'Selecionar uma louvor...';

        const versaoHTML = musica && musica.versao
          ? `<small style="color:#e67e22; display:block; margin-top:4px;">${musica.versao}</small>`
          : '';

        container.innerHTML += `
      <div class="musica-slot">
        <label><strong>${index + 1}ª Música</strong></label>
        <div onclick="abrirSelecaoMusica(event, ${index})" class="musica-campo">
          ${nome}
          ${versaoHTML}
        </div>
      </div>`;
      });

      container.innerHTML += `
        <button onclick="adicionarNovaMusica()" class="btn-adicionar">
          <ion-icon name="add-circle-outline"></ion-icon>Incluir louvor
        </button>`;
    }

    window.adicionarNovaMusica = function () {
      musicasSelecionadas.push(null);
      renderizarMusicas();
    };

    window.abrirSelecaoMusica = function (e, slotIndex) {
      e.stopPropagation();
      const width = 820;
      const height = 720;
      const left = (screen.width - width) / 2;
      const top = (screen.height - height) / 2;

      window.open(
        `selecionar-musica.html?slot=${slotIndex}`,
        'SelecionarMusica',
        `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
      );
    };

    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'musicaSelecionada') {
        const { slot, musica } = e.data;
        
        if (musica && typeof slot === 'number') {
          // Salva todos os campos importantes
          musicasSelecionadas[slot] = {
            titulo: musica.titulo,
            versao: musica.versao || '',
            tom: musica.tom || ''
          };
          renderizarMusicas();
        }
      }
    });

    function renderizarEquipe() {
      const container = document.getElementById('equipeContainer');
      container.innerHTML = '<h3 style="margin: 20px 0 15px 0;">Equipe de Louvor</h3>';

      if (todosMembros.length === 0) {
        container.innerHTML += '<p style="color:#999;">Nenhum membro cadastrado.</p>';
        return;
      }

      let html = '<div class="equipe-list">';
      todosMembros.forEach((membro, index) => {
        const checked = escalaAtual?.equipe?.some(m => m.nome === membro.nome) ? 'checked' : '';
        html += `
          <div class="membro-row">
            <div class="membro-info">
              <div class="membro-nome">${membro.nome}</div>
              <div class="membro-funcao">${membro.funcao}</div>
            </div>
            <label class="switch">
              <input type="checkbox" class="switch-input" data-index="${index}" ${checked}>
              <span class="slider"></span>
            </label>
          </div>`;
      });
      html += '</div>';
      container.innerHTML += html;
    }

    async function carregarEscala() {
      getUrlParams();
      await carregarDados();
      preencherTipoCulto();

      if (isNovaEscala) {
        musicasSelecionadas = [null];
        document.getElementById('btn-excluir').style.display = 'none';
      } else if (escalaId) {
        const docRef = doc(db, "escalasCulto", escalaId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          escalaAtual = docSnap.data();
          musicasSelecionadas = Array.isArray(escalaAtual.musicas) ? [...escalaAtual.musicas] : [null];
          document.getElementById('btn-excluir').style.display = 'block';
        } else {
          musicasSelecionadas = [null];
        }
      }

      document.getElementById('data').value = escalaAtual?.data || '';
      document.getElementById('tipoCulto').value = escalaAtual?.tipoCulto || '';
      document.getElementById('observacoes').value = escalaAtual?.observacoes || '';

      renderizarMusicas();
      renderizarEquipe();
    }

    window.salvarAlteracoes = async () => {
      let tipoCultoFinal = document.getElementById('tipoCulto').value;
      if (tipoCultoFinal === "personalizar") {
        tipoCultoFinal = document.getElementById('tipoCultoPersonalizado').value.trim();
      }

      const equipeSalvar = todosMembros
        .filter((_, i) => document.querySelector(`.switch-input[data-index="${i}"]`)?.checked)
        .map(m => ({ nome: m.nome, funcao: m.funcao }));

      const dados = {
        data: document.getElementById('data').value,
        tipoCulto: tipoCultoFinal,
        numMusicas: musicasSelecionadas.filter(Boolean).length,
        musicas: musicasSelecionadas.filter(Boolean),
        equipe: equipeSalvar,
        observacoes: document.getElementById('observacoes').value.trim(),
        status: "aprovada",
        criadoEm: escalaAtual?.criadoEm || new Date().toISOString(),
        aprovadaEm: new Date().toISOString()
      };

      try {
        if (isNovaEscala || !escalaId) {
          await addDoc(collection(db, "escalasCulto"), dados);
        } else if (escalaId) {
          await updateDoc(doc(db, "escalasCulto", escalaId), dados);
        }
        alert("✅ Escala salva e publicada com sucesso!");
        window.location.href = "index.html";
      } catch (e) {
        alert("Erro: " + e.message);
      }
    };

    window.cancelarEdicao = function () {
      if (confirm("Deseja cancelar as alterações?")) window.history.back();
    };

    window.excluirEscala = async function () {
      if (!confirm("Excluir esta escala permanentemente?")) return;
      await deleteDoc(doc(db, "escalasCulto", escalaId)).catch(() => { });
      alert("✅ Escala excluída com sucesso!");
      window.history.back();
    };

    window.onload = carregarEscala;
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
    }

    label {
      display: block;
      margin: 1.2rem 0 0.5rem;
      font-weight: 500;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
    }

    .musica-slot {
      margin-bottom: 1.6rem;
    }

    .musica-campo {
      padding: 14px 16px;
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      min-height: 52px;
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .musica-campo:hover {
      border-color: #3498db;
      background: #f1f8ff;
    }

    .btn-adicionar {
      padding: 12px 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      margin-top: 1rem;
      cursor: pointer;
    }

    .btn-salvar {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: white;
    }

    .btn-cancelar {
      background: #a0aec0;
      color: white;
    }

    .btn-excluir {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      margin-top: 10px;
    }

    .equipe-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .membro-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }

    .membro-info {
      flex: 1;
    }

    .membro-nome {
      font-weight: 600;
      color: #2c3e50;
    }

    .membro-funcao {
      font-size: 0.9rem;
      color: #64748b;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: .4s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #27ae60;
    }

    input:checked+.slider:before {
      transform: translateX(24px);
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <div class="card">
      <label>Data do Culto</label>
      <input type="date" id="data">

      <label>Tipo de Culto</label>
      <select id="tipoCulto" onchange="handleTipoCultoChange()"></select>
      <div id="personalizarTipoContainer" style="display:none; margin-top: 10px;">
        <input type="text" id="tipoCultoPersonalizado" placeholder="Digite o nome do culto">
      </div>

      <div id="equipeContainer"></div>

      <label>Músicas</label>
      <div id="musicasContainer"></div>

      <label>Observações</label>
      <textarea id="observacoes" placeholder="Observações opcionais..."></textarea>

      <button class="btn-salvar" onclick="salvarAlteracoes()">Salvar e Publicar Escala</button>
      <button class="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
      <button id="btn-excluir" class="btn-excluir" onclick="excluirEscala()" style="display: none;">
        🗑️ Excluir Escala
      </button>
    </div>
  </div>

  <script src="header.js"></script>
  <script>carregarHeader('Criar Escala');</script>
</body>

</html>
