<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalas de Louvor</title>
  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const escalasRef = collection(db, "escalasCulto");
    let usuarioLogado = false;

    onAuthStateChanged(auth, (user) => {
      usuarioLogado = !!(user && user.email === "hupcontato@gmail.com");
      atualizarMenu(user);
    });

    function atualizarMenu(user) {
      const btnLogin = document.getElementById('btnLogin');
      const menuLogado = document.getElementById('menuLogado');
      
      if (usuarioLogado) {
        btnLogin.style.display = 'none';
        menuLogado.style.display = 'flex';
      } else {
        btnLogin.style.display = 'inline-block';
        menuLogado.style.display = 'none';
      }
    }

    async function carregarEscalas() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<p class="loading">Carregando escalas aprovadas...</p>';

      try {
        const q = query(escalasRef, orderBy("data"));
        const snapshot = await getDocs(q);

        const escalasAprovadas = [];
        snapshot.forEach(doc => {
          const e = doc.data();
          if (e.status === "aprovada") {
            escalasAprovadas.push({ id: doc.id, ...e });
          }
        });

        if (escalasAprovadas.length === 0) {
          feed.innerHTML = `
            <div style="text-align:center; padding:100px 20px; color:#999;">
              <h2>Nenhuma escala postada</h2>
              <p style="margin-top:10px;">As escalas criadas aparecerão aqui.</p>
            </div>`;
          return;
        }

        // ✅ ORDENAR POR DATA (mais próximo primeiro)
        escalasAprovadas.sort((a, b) => {
          const dataA = new Date(a.data + 'T12:00:00');
          const dataB = new Date(b.data + 'T12:00:00');
          return dataA - dataB;
        });

        feed.innerHTML = '';

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        let encontrouEscala = false;

        escalasAprovadas.forEach(doc => {
          const e = doc;
          const escalaId = e.id;

          if (!e.data) return;

          const [ano, mes, dia] = e.data.split('-').map(Number);
          const dataEscala = new Date(ano, mes - 1, dia);
          dataEscala.setHours(0, 0, 0, 0);

          // Só escalas futuras
          if (dataEscala < hoje) return;

          encontrouEscala = true;

          const card = document.createElement('div');
          card.className = 'escala-card';

          if (usuarioLogado) {
            card.style.cursor = 'pointer';
            card.onclick = () => window.location.href = `editar-escala.html?id=${escalaId}`;
          }

          let dataFormatada = "Data inválida";
          if (e.data) {
            const dataCorreta = new Date(ano, mes - 1, dia);
            dataFormatada = dataCorreta.toLocaleDateString('pt-BR', { 
              weekday: 'short', 
              day: '2-digit', 
              month: 'short'
            });
          }

          card.innerHTML = `
            <div class="card-header">
              <span class="tipo-culto">${e.tipoCulto.replace('_e_', ' e ').toUpperCase()}</span>
              <div>
                <span class="data">${dataFormatada}</span>
              </div>
            </div>

            <div class="musicas">
              <div class="musica-list">
                ${e.musicas.map(m => `
                  <div class="musica-item">
                    <span class="titulo">${m.titulo} ${m.tom ? `- ${m.tom}` : ''}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="equipe">
              <div class="membros">
                ${e.equipe.map(m => `
                  <span class="membro-tag">${m.nome}</span>
                `).join('')}
              </div>
            </div>

            ${e.observacoes ? `
              <div class="observacoes">
                <strong>Obs.:</strong> ${e.observacoes}
              </div>` : ''}
          `;

          feed.appendChild(card);
        });

        if (!encontrouEscala) {
          feed.innerHTML = `
            <div style="text-align:center; padding:100px 20px; color:#999;">
              <h2>Nenhuma escala futura</h2>
              <p style="margin-top:10px;">As próximas escalas aparecerão aqui.</p>
            </div>`;
        }

        console.log(`📅 ${escalasAprovadas.filter(e => {
          const dataEscala = new Date(e.data + 'T12:00:00');
          return dataEscala >= hoje;
        }).length} escalas futuras ordenadas (próxima primeiro)`);

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p style="color:red; text-align:center; padding:40px;">Erro ao carregar as escalas.</p>';
      }
    }

    window.onload = () => {
      carregarEscalas();
      atualizarMenu();
    };
  </script>

  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8f9fc;
      color: #333;
      line-height: 1.6;
    }

    .header {
      position: sticky;
      top: 0;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      z-index: 100;
    }

    .header p {
      font-size: 1.25rem;
      font-weight: 700;
      color: #4c545c;
      margin-left: 32px;
    }

    .btn-login {
      background: #3498db;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.80rem;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #2980b9;
    }

    .container {
      max-width: 100%;
      margin: 0px;
      padding: 22px;
    }

    .escala-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.06);
      margin-bottom: 35px;
      overflow: hidden;
      border: 1px solid #f0f0f0;
    }

    .card-header {
      background: #f1f5f9;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    .data {
      font-weight: 500;
      color: #2c3e50;
      font-size: .90rem;
    }

    .tipo-culto {
      background: #3498db;
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.80rem;
      font-weight: 600;
    }

    .musicas {
      padding: 20px;
    }

    .musica-list {
      display: flex;
      flex-direction: column;
    }

    .musica-item {
      border-bottom: 1px solid #f5f5f5;
    }

    .musica-item:last-child {
      border-bottom: none;
    }

    .titulo {
      display: block;
      margin-left: 12px;
      font-size: .90rem;
      color: #263238;
    }

    .equipe {
      padding: 0 20px 20px 20px;
    }

    .membros {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .membro-tag {
      background: #f1f5f9;
      color: #334155;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.88rem;
    }

    .observacoes {
      background: #fff8e1;
      padding: 16px 20px;
      border-top: 1px solid #ffeaa7;
      color: #5d4037;
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      .container {
        margin: 0px;
      }
      .header {
        padding: 14px 18px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <p>Escala de Louvor</p>
    <div>
      <a href="login.html" class="btn-login" id="btnLogin">Login</a>
      <div id="menuLogado" style="display:none; gap:10px; flex-wrap:wrap;">
        <a href="menu.html" class="btn-login">Menu</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="feed"></div>
  </div>
</body>
</html>
