<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Escalas de Louvor</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons/7.1.0/dist/ionicons/ionicons.js"></script>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let usuarioLogado = false;
    let escalasTodas = [];
    let mostrandoAnteriores = false;

    onAuthStateChanged(auth, (user) => {
      usuarioLogado = !!(user && user.email === "hupcontato@gmail.com");
      atualizarMenu(user);
    });

    function atualizarMenu() {
      const btnLogin = document.getElementById('btnLogin');
      const menuLogado = document.getElementById('menuLogado');

      if (usuarioLogado) {
        btnLogin.style.display = 'none';
        menuLogado.style.display = 'flex';
      } else {
        btnLogin.style.display = 'inline-block';
        menuLogado.style.display = 'none';
      }
    }

    // ==================== ORDENAÇÃO ====================
    function ordenarEscalas(escalas) {
      const ordemCultos = {
        "EBD": 1,
        "Louvor e Pregação": 2,
        "Oração e Doutrina": 3,
        "Evento Especial": 4
      };

      return escalas.sort((a, b) => {
        if (a.data !== b.data) return a.data.localeCompare(b.data);
        const ordemA = ordemCultos[a.tipoCulto] || 99;
        const ordemB = ordemCultos[b.tipoCulto] || 99;
        return ordemA - ordemB;
      });
    }

    async function carregarEscalas(mostrarAnteriores = false) {
      mostrandoAnteriores = mostrarAnteriores;
      const feed = document.getElementById('feed');
      const btnAlternar = document.getElementById('btnAlternar');
      const titulo = document.getElementById('tituloFeed');

      feed.innerHTML = '<p class="loading">Carregando escalas...</p>';

      try {
        const escalasRef = collection(db, "escalasCulto");
        const q = query(escalasRef, orderBy("data", "desc"));
        const snapshot = await getDocs(q);

        escalasTodas = [];
        snapshot.forEach(doc => {
          const e = doc.data();
          if (e.status === "aprovada") {
            escalasTodas.push({ id: doc.id, ...e });
          }
        });

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);

        let escalasFiltradas = [];

        if (mostrarAnteriores) {
          escalasFiltradas = escalasTodas
            .filter(e => new Date(e.data + 'T12:00:00') < hoje)
            .slice(0, 30);
          titulo.textContent = "Últimas 30 Escalas Realizadas";
          btnAlternar.innerHTML = `Voltar`;
        } else {
          escalasFiltradas = escalasTodas
            .filter(e => new Date(e.data + 'T12:00:00') >= hoje);
          titulo.textContent = "";
          btnAlternar.innerHTML = `Anteriores`;
        }

        escalasFiltradas = ordenarEscalas(escalasFiltradas);

        if (escalasFiltradas.length === 0) {
          feed.innerHTML = `
            <div class="empty-state">
              <h2>${mostrarAnteriores ? 'Nenhuma escala passada encontrada' : 'Não há escalas futuras'}</h2>
              <p>${mostrarAnteriores ? 'As últimas escalas realizadas aparecerão aqui.' : 'As próximas escalas aparecerão aqui assim que forem aprovadas.'}</p>
            </div>`;
          return;
        }

        feed.innerHTML = '';
        escalasFiltradas.forEach(escala => {
          const card = criarEscalaCard(escala, usuarioLogado);
          feed.appendChild(card);
        });

      } catch (error) {
        console.error(error);
        feed.innerHTML = '<p class="error">Erro ao carregar as escalas.</p>';
      }
    }

    window.alternarEscalas = function() {
      carregarEscalas(!mostrandoAnteriores);
    };

    // Nova função para abrir selecionar música
    window.abrirSelecionarMusica = function() {
      const width = 820;
      const height = 720;
      const left = (screen.width - width) / 2;
      const top = (screen.height - height) / 2;

      window.open(
        'selecionar-musica.html',
        'SelecionarMusica',
        `width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`
      );
    };

    window.onload = () => {
      carregarEscalas(false);
    };
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fc;
      color: #333;
      line-height: 1.6;
    }

    .header {
      position: sticky;
      top: 0;
      padding: 16px 1rem 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      z-index: 100;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem;
    }

    .btn-alternar {
      display: block;
      margin: 1px auto 25px auto;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      background: #e9ecef;
      color: #5a6470;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      width: fit-content;
    }

    .btn-alternar:hover {
      background: #dee2e6;
      transform: translateY(-1px);
    }

    .loading, .empty-state, .error {
      text-align: center;
      padding: 80px 20px;
      color: #777;
    }

    .empty-state h2 {
      color: #2c3e50;
      margin-bottom: 12px;
    }

    .btn-login {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
      padding: 12px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <header class="header">
    <h1 style="font-size: 1.2rem; margin: 0;font-weight: 500;"></h1>
    <div style="display: flex; gap: 8px; align-items: center;">
      <a href="login.html" class="btn-login" id="btnLogin">Login</a>
      <div id="menuLogado" style="display:none; gap:8px;">
        <a href="menu.html" class="btn-login">Menu</a>
        <button onclick="abrirSelecionarMusica()" class="btn-login" style="background: linear-gradient(135deg, #27ae60, #2ecc71);">
          🎵 Selecionar Música
        </button>
      </div>
    </div>
  </header>

  <div class="container">
    <button onclick="alternarEscalas()" id="btnAlternar" class="btn-alternar">
      Anteriores
    </button>

    <h2 id="tituloFeed" style="margin: 10px 0 20px 5px; color: #2c3e50; text-align: center;"></h2>
    
    <div id="feed"></div>
  </div>

  <script src="escala-card.js"></script>
</body>
</html>
