<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Escala - Louvor</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script type="module">
    import { db, auth } from './firebase-config.js';
    import {
      doc, getDoc, updateDoc, collection, getDocs, addDoc, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    let escalaId = null;
    let escalaAtual = null;
    let todasMusicas = [];
    let todosMembros = [];
    let cultosFixos = [];
    let isNovaEscala = false;
    let statusOriginal = "pendente";

    onAuthStateChanged(auth, (user) => {
      if (!user || user.email !== "hupcontato@gmail.com") {
        window.location.href = "login.html";
      }
    });

    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      escalaId = params.get('id');
      isNovaEscala = params.get('nova') === 'true';
    }

    async function carregarDados() {
      await Promise.all([
        carregarCultosFixos(),
        carregarTodasMusicas(),
        carregarTodosMembros()
      ]);
    }

    async function carregarCultosFixos() {
      const snapshot = await getDocs(collection(db, "cultosFixos"));
      cultosFixos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    async function carregarTodasMusicas() {
      const snapshot = await getDocs(collection(db, "musicas"));
      todasMusicas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    async function carregarTodosMembros() {
      const snapshot = await getDocs(collection(db, "membrosEquipe"));
      todosMembros = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }

    function preencherTipoCulto() {
      const select = document.getElementById('tipoCulto');
      select.innerHTML = '<option value="">Selecione o tipo de culto...</option>';
      cultosFixos.forEach(culto => {
        select.innerHTML += `<option value="${culto.nome}">${culto.nome}</option>`;
      });
      select.innerHTML += `<option value="personalizar">Personalizar...</option>`;
    }

    function preencherNumMusicas() {
      const select = document.getElementById('numMusicas');
      select.innerHTML = '<option value="">Selecione a quantidade...</option>';
      const nums = [...new Set(cultosFixos.map(c => c.numMusicas))].sort((a, b) => a - b);
      nums.forEach(num => {
        select.innerHTML += `<option value="${num}">${num} músicas</option>`;
      });
      select.innerHTML += `<option value="personalizar">Personalizar...</option>`;
    }

    function handleTipoCultoChange() {
      const valor = document.getElementById('tipoCulto').value;
      const container = document.getElementById('personalizarTipoContainer');
      if (valor === "personalizar") {
        container.style.display = 'block';
      } else {
        container.style.display = 'none';
        const culto = cultosFixos.find(c => c.nome === valor);
        if (culto) {
          document.getElementById('numMusicas').value = culto.numMusicas;
          renderizarMusicas(culto.numMusicas);
        }
      }
    }

    function handleNumMusicasChange() {
      const valor = document.getElementById('numMusicas').value;
      const container = document.getElementById('personalizarNumContainer');
      if (valor === "personalizar") {
        container.style.display = 'block';
      } else {
        container.style.display = 'none';
        renderizarMusicas(parseInt(valor) || 5);
      }
    }

    function renderizarMusicas(numMusicas = 5) {
      const container = document.getElementById('musicasContainer');
      container.innerHTML = '';
      for (let i = 0; i < numMusicas; i++) {
        const musicaAtual = escalaAtual?.musicas?.[i] || {};
        container.innerHTML += `
          <div class="musica-edit">
            <label><strong>${i + 1}ª Música</strong></label>
            <select class="select-musica">
              <option value="">Selecione uma música...</option>
              ${todasMusicas.map(mus => `
                <option value="${mus.id}" ${mus.titulo === musicaAtual.titulo ? 'selected' : ''}>
                  ${mus.titulo} ${mus.tom ? `(${mus.tom})` : ''}
                </option>
              `).join('')}
            </select>
          </div>
        `;
      }
    }

    function renderizarEquipe() {
      const container = document.getElementById('equipeContainer');
      container.innerHTML = '<h3 style="margin: 20px 0 10px 0;">Equipe de Louvor</h3>';

      if (todosMembros.length === 0) {
        container.innerHTML += '<p style="color:#999;">Nenhum membro cadastrado.</p>';
        return;
      }

      let html = '<div class="equipe-grid">';
      todosMembros.forEach((membro, index) => {
        const estaSelecionado = escalaAtual?.equipe?.some(m => m.nome === membro.nome) || false;
        html += `
          <div class="membro-item">
            <div>
              <div class="membro-nome">${membro.nome}</div>
              <div class="membro-funcao">${membro.funcao}</div>
            </div>
            <label class="switch-container">
              <input type="checkbox" class="switch-input" data-index="${index}" ${estaSelecionado ? 'checked' : ''}>
              <span class="switch-toggle"></span>
            </label>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML += html;
    }

    async function carregarEscala() {
      getUrlParams();
      await carregarDados();

      preencherTipoCulto();
      preencherNumMusicas();

      if (isNovaEscala) {
        escalaAtual = { data: "", tipoCulto: "", numMusicas: 5, musicas: [], equipe: [], observacoes: "" };
        statusOriginal = "pendente";
      } else if (escalaId) {
        let docRef = doc(db, "escalasPendentes", escalaId);
        let docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          docRef = doc(db, "escalasCulto", escalaId);
          docSnap = await getDoc(docRef);
        }

        if (docSnap.exists()) {
          escalaAtual = docSnap.data();
          statusOriginal = escalaAtual.status || "pendente";
        }
      }

      document.getElementById('data').value = escalaAtual.data || '';
      document.getElementById('tipoCulto').value = escalaAtual.tipoCulto || '';
      document.getElementById('numMusicas').value = escalaAtual.numMusicas || '';
      document.getElementById('observacoes').value = escalaAtual.observacoes || '';

      renderizarMusicas(escalaAtual.numMusicas || 5);
      renderizarEquipe();

      // Mostrar ou esconder botão de excluir
      document.getElementById('btn-excluir').style.display = isNovaEscala ? 'none' : 'block';
    }

    // ====================== SALVAR ======================
    window.salvarAlteracoes = async () => {
      let tipoCultoFinal = document.getElementById('tipoCulto').value;
      if (tipoCultoFinal === "personalizar") {
        tipoCultoFinal = document.getElementById('tipoCultoPersonalizado').value.trim();
        if (!tipoCultoFinal) return alert("Digite o nome do culto personalizado.");
      }

      let numMusicasFinal = parseInt(document.getElementById('numMusicas').value);
      if (document.getElementById('numMusicas').value === "personalizar") {
        numMusicasFinal = parseInt(document.getElementById('numMusicasPersonalizado').value);
        if (!numMusicasFinal || numMusicasFinal < 1) return alert("Digite uma quantidade válida de músicas.");
      }

      const musicasSelecionadas = Array.from(document.querySelectorAll('.select-musica'))
        .map(select => todasMusicas.find(m => m.id === select.value))
        .filter(Boolean)
        .map(m => ({ titulo: m.titulo, tom: m.tom }));

      if (musicasSelecionadas.length !== numMusicasFinal) {
        return alert(`Você deve selecionar exatamente ${numMusicasFinal} músicas.`);
      }

      const equipeSalvar = todosMembros
        .filter((_, index) => {
          const checkbox = document.querySelector(`.switch-input[data-index="${index}"]`);
          return checkbox && checkbox.checked;
        })
        .map(m => ({ nome: m.nome, funcao: m.funcao }));

      const dados = {
        data: document.getElementById('data').value,
        tipoCulto: tipoCultoFinal,
        numMusicas: numMusicasFinal,
        musicas: musicasSelecionadas,
        equipe: equipeSalvar,
        observacoes: document.getElementById('observacoes').value.trim(),
        status: statusOriginal,
        criadoEm: escalaAtual.criadoEm || new Date().toISOString()
      };

      try {
        if (isNovaEscala) {
          await addDoc(collection(db, "escalasPendentes"), dados);
          alert("✅ Nova escala criada com sucesso!");
        } else if (escalaId) {
          let docRef = doc(db, "escalasPendentes", escalaId);
          let docSnap = await getDoc(docRef);
          if (!docSnap.exists()) {
            docRef = doc(db, "escalasCulto", escalaId);
          }
          await updateDoc(docRef, dados);
          alert("✅ Escala atualizada com sucesso!");
        }
        window.location.href = "escalas-pendentes.html";
      } catch (e) {
        alert("Erro ao salvar: " + e.message);
      }
    };

    // ====================== EXCLUIR ESCALA ======================
    window.excluirEscala = async function () {
      if (!confirm("⚠️ Tem certeza que deseja excluir esta escala permanentemente?\n\nEsta ação não pode ser desfeita.")) {
        return;
      }

      try {
        // Tenta excluir das duas coleções (uma delas provavelmente não existe)
        await deleteDoc(doc(db, "escalasPendentes", escalaId)).catch(() => { });
        await deleteDoc(doc(db, "escalasCulto", escalaId)).catch(() => { });

        alert("🗑️ Escala excluída com sucesso!");

        // Volta para a página anterior (melhor experiência)
        setTimeout(() => {
          window.history.back();
        }, 800);   // pequeno delay para o usuário ver o alert
      } catch (e) {
        alert("Erro ao excluir escala: " + e.message);
      }
    };

    document.addEventListener('change', (e) => {
      if (e.target.id === 'tipoCulto') handleTipoCultoChange();
      if (e.target.id === 'numMusicas') handleNumMusicasChange();
    });

    window.onload = carregarEscala;
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #fff;
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: .5rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin: 1.2rem 0 0.5rem;
      font-weight: 600;
      color: #4a5568;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #4299e1;
      outline: none;
    }

    .personalizar-container {
      margin-top: 8px;
      display: none;
    }

    .equipe-grid {
      display: grid;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .membro-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #f7fafc;
      border-radius: 10px;
      border: 2px solid #edf2f7;
    }

    .membro-nome {
      font-weight: 600;
      color: #2d3748;
    }

    .membro-funcao {
      color: #718096;
      font-size: 0.9rem;
    }

    .switch-container {
      position: relative;
      width: 50px;
      height: 26px;
    }

    .switch-input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-toggle {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #cbd5e0;
      border-radius: 26px;
      cursor: pointer;
    }

    .switch-toggle::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .switch-input:checked+.switch-toggle {
      background: #48bb78;
    }

    .switch-input:checked+.switch-toggle::before {
      transform: translateX(24px);
    }

    .musica-edit {
      margin-bottom: 1.5rem;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }

    .btn-salvar {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: white;
    }

    .btn-cancelar {
      background: #a0aec0;
      color: white;
    }

    .btn-excluir {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="header-placeholder"></div>

    <div class="card">
      <label>Data do Culto</label>
      <input type="date" id="data">

      <label>Tipo de Culto</label>
      <select id="tipoCulto" onchange="handleTipoCultoChange()"></select>
      <div id="personalizarTipoContainer" class="personalizar-container">
        <input type="text" id="tipoCultoPersonalizado" placeholder="Digite o nome do culto">
      </div>

      <label>Número de Músicas</label>
      <select id="numMusicas" onchange="handleNumMusicasChange()"></select>
      <div id="personalizarNumContainer" class="personalizar-container">
        <input type="number" id="numMusicasPersonalizado" min="1" max="10" placeholder="Quantidade de músicas">
      </div>

      <div id="equipeContainer"></div>

      <label>Músicas</label>
      <div id="musicasContainer"></div>

      <label>Observações</label>
      <textarea id="observacoes" placeholder="Observações opcionais..."></textarea>

      <button class="btn-salvar" onclick="salvarAlteracoes()">Salvar Alterações</button>
      <button class="btn-cancelar" onclick="window.history.back()">Cancelar</button>
      <button id="btn-excluir" class="btn-excluir" onclick="excluirEscala()" style="display:none;">
        🗑️ Excluir Escala
      </button>
    </div>
  </div>

  <script src="header.js"></script>
  <script>carregarHeader('Editar Escala');</script>
</body>

</html>
